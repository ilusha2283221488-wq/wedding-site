<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш свадебный день 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      color: #034078;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { font-size: 1.2rem; margin-bottom: 2rem; }
    .timer { 
      font-size: 2rem; 
      margin-bottom: 2rem; 
      display: flex; 
      gap: 1rem; 
      justify-content: center; 
      flex-wrap: wrap;
    }
    .timer div { 
      background: rgba(255, 255, 255, 0.3); 
      padding: 1rem; 
      border-radius: 10px; 
      min-width: 70px; 
      backdrop-filter: blur(5px);
    }

    form {
      background: rgba(255, 255, 255, 0.7);
      padding: 2rem;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 500px;
      width: 100%;
      margin-bottom: 2rem;
      box-sizing: border-box;
      backdrop-filter: blur(5px);
    }

    input, select, textarea, button {
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    button {
      background-color: #0288d1;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover { background-color: #026aa7; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    .diagnostic-btn {
      background-color: #ff9800;
      margin-top: 10px;
    }

    .diagnostic-btn:hover {
      background-color: #f57c00;
    }

    footer { font-size: 0.9rem; color: #555; margin-top: 2rem; }

    @keyframes fadeIn { 
      0% { opacity: 0; transform: translateY(20px); } 
      100% { opacity: 1; transform: translateY(0); } 
    }
    
    h1, p, .timer, form { 
      animation: fadeIn 1s ease forwards; 
    }

    #status-message, #diagnostic-info {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      display: none;
      max-width: 500px;
      width: 100%;
      font-weight: bold;
      white-space: pre-wrap;
      text-align: left;
    }

    .success { background-color: #e8f5e8; color: #2e7d32; }
    .error { background-color: #ffebee; color: #c62828; }
    .info { background-color: #e3f2fd; color: #01579b; }
  </style>
</head>
<body>

  <h1>Наша свадьба 💍</h1>
  <p>Дорогие гости! Мы рады пригласить вас разделить этот особенный день с нами!</p>

  <div class="timer">
    <div><span id="days">00</span> Дней</div>
    <div><span id="hours">00</span> Часов</div>
    <div><span id="minutes">00</span> Минут</div>
    <div><span id="seconds">00</span> Секунд</div>
  </div>

  <form id="rsvp-form">
    <h2 style="margin:0; color:#034078;">Форма подтверждения</h2>
    
    <input type="text" id="fio" placeholder="Ваше ФИО *" required>
    <input type="text" id="fiosputnik" placeholder="ФИО спутника/спутницы">
    
    <select id="attending" required>
      <option value="">Сможете ли вы присутствовать? *</option>
      <option value="Да">Да, с радостью приду</option>
      <option value="Нет">Нет, к сожалению не смогу</option>
    </select>
    
    <input type="number" id="guests_count" placeholder="Количество гостей (включая вас) *" min="1" value="1" required>
    <input type="text" id="alcohol" placeholder="Предпочтения по алкоголю">
    <input type="text" id="allergy" placeholder="Аллергии или особенности питания">
    <input type="text" id="favtrack" placeholder="Любимая песня">
    
    <button type="submit" id="submit-btn">Отправить подтверждение</button>
  </form>

  <button class="diagnostic-btn" id="diagnostic-btn">🔍 Проверить структуру таблицы</button>
  
  <div id="status-message"></div>
  <div id="diagnostic-info"></div>

  <footer>© 2026 Наш свадебный сайт</footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      // Таймер
      const weddingDate = new Date("2026-08-20T14:00:00").getTime();
      
      function updateTimer() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        if (distance < 0) {
          document.getElementById("days").textContent = "00";
          document.getElementById("hours").textContent = "00";
          document.getElementById("minutes").textContent = "00";
          document.getElementById("seconds").textContent = "00";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = days.toString().padStart(2, "0");
        document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
        document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
        document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
      }
      
      setInterval(updateTimer, 1000);
      updateTimer();

      // Supabase
      if (typeof supabase === 'undefined') {
        alert('Ошибка: Supabase не загружен');
        return;
      }

      const SUPABASE_URL = 'https://rtbrakcukphsmqodwuvg.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnJha2N1a3Boc21xb2R3dXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjAzMjcsImV4cCI6MjA4ODAzNjMyN30.keBClSxV7XvSh2--XEhWY-VAR8oPR4BmVAuJEaNNizk';
      
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('rsvp-form');
      const submitBtn = document.getElementById('submit-btn');
      const statusMessage = document.getElementById('status-message');
      const diagnosticBtn = document.getElementById('diagnostic-btn');
      const diagnosticInfo = document.getElementById('diagnostic-info');

      // Функция для диагностики
      async function checkTableStructure() {
        diagnosticInfo.style.display = 'block';
        diagnosticInfo.className = 'info';
        diagnosticInfo.innerHTML = '⏳ Проверяем структуру таблицы...';
        
        try {
          // Пробуем получить структуру через запрос с limit 0
          const { data, error } = await supabaseClient
            .from('guests')
            .select('*')
            .limit(0);

          if (error) {
            diagnosticInfo.className = 'error';
            diagnosticInfo.innerHTML = `
              <strong>❌ Ошибка доступа:</strong><br>
              ${error.message}<br><br>
              <strong>Код ошибки:</strong> ${error.code || 'Нет'}<br>
              <strong>Детали:</strong> ${error.details || 'Нет'}
            `;
            return;
          }

          // Пытаемся получить одну запись чтобы увидеть структуру
          const { data: sampleData, error: sampleError } = await supabaseClient
            .from('guests')
            .select('*')
            .limit(1);

          if (sampleError) {
            diagnosticInfo.innerHTML = `
              <strong>⚠️ Таблица доступна, но не удалось получить данные</strong><br>
              Ошибка: ${sampleError.message}
            `;
            return;
          }

          if (sampleData && sampleData.length > 0) {
            // Если есть данные, показываем структуру
            const columns = Object.keys(sampleData[0]);
            diagnosticInfo.className = 'success';
            diagnosticInfo.innerHTML = `
              <strong>✅ Найденные колонки в таблице:</strong><br>
              ${columns.join(', ')}<br><br>
              <strong>Пример данных:</strong><br>
              ${JSON.stringify(sampleData[0], null, 2)}
            `;
          } else {
            // Если таблица пустая, пробуем создать тестовую запись и сразу удалить
            diagnosticInfo.innerHTML = `
              <strong>ℹ️ Таблица пуста</strong><br><br>
              Попробуйте создать тестовую запись через форму.
            `;
          }

        } catch (err) {
          diagnosticInfo.className = 'error';
          diagnosticInfo.innerHTML = '❌ Ошибка: ' + err.message;
        }
      }

      diagnosticBtn.addEventListener('click', checkTableStructure);

      // Отправка формы
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка...';
        statusMessage.style.display = 'none';
        diagnosticInfo.style.display = 'none';

        // ВРЕМЕННО: отправляем только базовые поля для теста
        const testData = {
          FIO: document.getElementById('fio').value.trim(),
          attending: document.getElementById('attending').value,
          guests_count: parseInt(document.getElementById('guests_count').value) || 1
        };

        console.log('Тестовые данные:', testData);

        try {
          const { data, error } = await supabaseClient
            .from('guests')
            .insert([testData])
            .select();

          if (error) {
            console.error('Ошибка:', error);
            statusMessage.style.display = 'block';
            statusMessage.className = 'error';
            statusMessage.innerHTML = `
              <strong>❌ Ошибка:</strong> ${error.message}<br>
              <strong>Код:</strong> ${error.code || 'Нет'}<br>
              <strong>Детали:</strong> ${error.details || 'Нет'}
            `;
          } else {
            console.log('Успех:', data);
            statusMessage.style.display = 'block';
            statusMessage.className = 'success';
            statusMessage.innerHTML = '✅ Тестовая отправка успешна! Теперь можно добавить остальные поля.';
          }
        } catch (err) {
          console.error('Ошибка:', err);
          statusMessage.style.display = 'block';
          statusMessage.className = 'error';
          statusMessage.innerHTML = 'Ошибка: ' + err.message;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Отправить подтверждение';
        }
      });
    });
  </script>

</body>
</html>
