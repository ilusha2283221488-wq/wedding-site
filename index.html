<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш свадебный день 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      color: #034078;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: fadeInDown 1s ease forwards;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      animation: fadeIn 2s ease forwards;
    }

    .rsvp-button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background-color: #0288d1;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      animation: fadeInUp 2.5s ease forwards;
    }

    .rsvp-button:hover {
      background-color: #026aa7;
    }

    .timer {
      font-size: 2rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      animation: fadeIn 2s ease forwards;
    }

    .timer div {
      background: rgba(255, 255, 255, 0.3);
      padding: 1rem;
      border-radius: 10px;
      min-width: 70px;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #555;
    }

    /* Анимации */
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-50px);}
      100% { opacity: 1; transform: translateY(0);}
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(50px);}
      100% { opacity: 1; transform: translateY(0);}
    }

    @keyframes fadeIn {
      0% { opacity: 0;}
      100% { opacity: 1;}
    }
  </style>
</head>
<body>

  <h1>Наша свадьба 💍</h1>
  <p>Мы рады пригласить вас разделить этот особенный день с нами!</p>

  <div class="timer">
    <div><span id="days">00</span> Дн</div>
    <div><span id="hours">00</span> Ч</div>
    <div><span id="minutes">00</span> М</div>
    <div><span id="seconds">00</span> С</div>
  </div>

  <button class="rsvp-button" onclick="alert('Форма RSVP скоро будет доступна 🎉')">Подтвердить участие</button>

  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-summer.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
  </audio>

  <footer>© 2026 Наш свадебный сайт</footer>

 <script>
  // Таймер
  const weddingDate = new Date("2026-08-20T14:00:00").getTime();

  function updateTimer() {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").textContent = days.toString().padStart(2, "0");
    document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
    document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
    document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
  }

  setInterval(updateTimer, 1000);
  updateTimer();
</script>

</body>
</html>
