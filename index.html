<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш свадебный день 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      color: #034078;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    p { font-size: 1.2rem; margin-bottom: 2rem; }
    .timer { font-size: 2rem; margin-bottom: 2rem; display: flex; gap: 1rem; justify-content: center; }
    .timer div { background: rgba(255, 255, 255, 0.3); padding: 1rem; border-radius: 10px; min-width: 70px; }

    form {
      background: rgba(255, 255, 255, 0.7);
      padding: 2rem;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 400px;
      width: 100%;
      margin-bottom: 2rem;
      box-sizing: border-box;
    }

    input, select, textarea, button {
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background-color: #0288d1;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background-color: #026aa7; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    footer { font-size: 0.9rem; color: #555; margin-top: 2rem; }

    /* Анимации */
    @keyframes fadeIn { 0% { opacity: 0;} 100% { opacity: 1;} }
    h1, p, .timer, form { animation: fadeIn 1s ease forwards; }

    #status-message {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      display: none;
      max-width: 400px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>Наша свадьба 💍</h1>
  <p>Мы рады пригласить вас разделить этот особенный день с нами!</p>

  <div class="timer">
    <div><span id="days">00</span> Дн</div>
    <div><span id="hours">00</span> Ч</div>
    <div><span id="minutes">00</span> М</div>
    <div><span id="seconds">00</span> С</div>
  </div>

  <form id="rsvp-form">
    <!-- Поле для имени (FIO) -->
    <input type="text" id="fio" placeholder="Ваше ФИО" required>
    
    <!-- Поле для имени спутника (FIOsputnik) -->
    <input type="text" id="fiosputnik" placeholder="ФИО спутника/спутницы">
    
    <!-- Поле для телефона (добавили новое поле, так как в БД его нет) -->
    <input type="text" id="phone" placeholder="Телефон (для связи)">
    
    <!-- Придете или нет (attending) -->
    <select id="attending" required>
      <option value="">Вы придёте?</option>
      <option value="yes">Да, с радостью приду</option>
      <option value="no">Нет, не смогу присутствовать</option>
    </select>
    
    <!-- Количество гостей (guests_count) -->
    <input type="number" id="guests_count" placeholder="Количество гостей (включая вас)" min="1" value="1">
    
    <!-- Предпочтения по алкоголю (alcohol) -->
    <input type="text" id="alcohol" placeholder="Предпочтения по алкоголю">
    
    <!-- Аллергии/особенности питания (allergic) -->
    <input type="text" id="allergic" placeholder="Аллергии или особенности питания">
    
    <!-- Любимая песня (favtrack) -->
    <input type="text" id="favtrack" placeholder="Ваша любимая песня (для танцев)">
    
    <!-- Пожелания (можно оставить как текст или добавить отдельное поле, но в БД нет wishes, поэтому используем allergic или favtrack) -->
    <textarea id="wishes" placeholder="Ваши пожелания молодоженам" rows="2"></textarea>
    
    <button type="submit" id="submit-btn">Отправить RSVP</button>
  </form>

  <div id="status-message"></div>

  <footer>© 2026 Наш свадебный сайт</footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      // ---------------- Таймер ----------------
      const weddingDate = new Date("2026-08-20T14:00:00").getTime();
      
      function updateTimer() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = days.toString().padStart(2, "0");
        document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
        document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
        document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
      }
      
      setInterval(updateTimer, 1000);
      updateTimer();

      // ---------------- Supabase ----------------
      if (typeof supabase === 'undefined') {
        console.error('Supabase не загружен!');
        document.getElementById('status-message').style.display = 'block';
        document.getElementById('status-message').style.backgroundColor = '#ffebee';
        document.getElementById('status-message').style.color = '#c62828';
        document.getElementById('status-message').innerHTML = '❌ Ошибка загрузки Supabase. Обновите страницу.';
        return;
      }

      const SUPABASE_URL = 'https://rtbrakcukphsmqodwuvg.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnJha2N1a3Boc21xb2R3dXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjAzMjcsImV4cCI6MjA4ODAzNjMyN30.keBClSxV7XvSh2--XEhWY-VAR8oPR4BmVAuJEaNNizk';
      
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const form = document.getElementById('rsvp-form');
      const submitBtn = document.getElementById('submit-btn');
      const statusMessage = document.getElementById('status-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка...';
        statusMessage.style.display = 'none';

        // Преобразуем attending в нужный формат (возможно нужно 'yes'/'no' или true/false)
        const attendingValue = document.getElementById('attending').value;
        
        // Подготавливаем данные строго под структуру таблицы
        const formData = {
          FIO: document.getElementById('fio').value,
          FIOsputnik: document.getElementById('fiosputnik').value || null,
          attending: attendingValue,  // или можно преобразовать: attendingValue === 'yes' ? 'Да' : 'Нет'
          guests_count: parseInt(document.getElementById('guests_count').value) || 1,
          alcohol: document.getElementById('alcohol').value || null,
          allergic: document.getElementById('allergic').value || null,
          favtrack: document.getElementById('favtrack').value || null
        };

        // Добавляем wishes в allergic или другое поле, так как отдельного поля нет
        const wishes = document.getElementById('wishes').value;
        if (wishes && formData.allergic) {
          formData.allergic = formData.allergic + ' | Пожелания: ' + wishes;
        } else if (wishes) {
          formData.allergic = 'Пожелания: ' + wishes;
        }

        console.log('Отправляемые данные:', formData);

        try {
          const { data, error } = await supabaseClient
            .from('guests')
            .insert([formData]);

          if (error) {
            console.error('Ошибка Supabase:', error);
            
            statusMessage.style.display = 'block';
            statusMessage.style.backgroundColor = '#ffebee';
            statusMessage.style.color = '#c62828';
            statusMessage.innerHTML = `
              <strong>❌ Ошибка:</strong> ${error.message}<br>
              <small>Проверьте консоль (F12) для деталей</small>
            `;
            
            alert('Ошибка при отправке: ' + error.message);
          } else {
            console.log('Успешно отправлено:', data);
            
            statusMessage.style.display = 'block';
            statusMessage.style.backgroundColor = '#e8f5e8';
            statusMessage.style.color = '#2e7d32';
            statusMessage.innerHTML = '✅ Спасибо! Ваш ответ отправлен 🎉';
            
            alert('Спасибо! Ваш ответ отправлен 🎉');
            form.reset();
          }
        } catch (err) {
          console.error('Необработанная ошибка:', err);
          statusMessage.innerHTML = '❌ Произошла непредвиденная ошибка: ' + err.message;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Отправить RSVP';
        }
      });
    });
  </script>

</body>
</html>
