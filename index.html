<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш свадебный день 💍</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }
    .diagnostic {
      background: #f0f0f0;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: left;
    }
    pre {
      background: #333;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Диагностика Supabase</h1>
  
  <div class="diagnostic">
    <h3>Проверка подключения:</h3>
    <button onclick="testConnection()">1. Проверить соединение</button>
    <button onclick="checkStructure()">2. Проверить структуру таблицы</button>
    <button onclick="testInsert()">3. Тестовый INSERT</button>
  </div>

  <div id="result"></div>

  <script>
    const SUPABASE_URL = 'https://rtbrakcukphsmqodwuvg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0YnJha2N1a3Boc21xb2R3dXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjAzMjcsImV4cCI6MjA4ODAzNjMyN30.keBClSxV7XvSh2--XEhWY-VAR8oPR4BmVAuJEaNNizk';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const resultDiv = document.getElementById('result');

    function showResult(text, isError = false) {
      resultDiv.innerHTML = `<pre class="${isError ? 'error' : 'success'}">${text}</pre>`;
    }

    async function testConnection() {
      try {
        showResult('Проверяем соединение...');
        const { data, error } = await supabase.from('guests').select('*').limit(1);
        
        if (error) {
          showResult(`Ошибка соединения: ${JSON.stringify(error, null, 2)}`, true);
        } else {
          showResult(`Соединение успешно! Данные: ${JSON.stringify(data, null, 2)}`);
        }
      } catch (err) {
        showResult(`Критическая ошибка: ${err.message}`, true);
      }
    }

    async function checkStructure() {
      try {
        showResult('Получаем структуру таблицы...');
        
        // Пробуем получить структуру через head запрос
        const { data, error } = await supabase
          .from('guests')
          .select('*')
          .limit(0);

        if (error) {
          showResult(`Ошибка получения структуры: ${JSON.stringify(error, null, 2)}`, true);
          return;
        }

        // Если не получили структуру, пробуем другой метод
        const { data: sample, error: sampleError } = await supabase
          .from('guests')
          .select('*')
          .limit(1);

        if (sampleError) {
          showResult(`Не удалось получить данные: ${JSON.stringify(sampleError, null, 2)}`, true);
        } else if (sample && sample.length > 0) {
          const columns = Object.keys(sample[0]);
          showResult(`✅ Найдены колонки:\n${columns.join('\n')}\n\nПример данных:\n${JSON.stringify(sample[0], null, 2)}`);
        } else {
          showResult('Таблица пуста. Попробуйте выполнить INSERT тестовых данных.');
        }
      } catch (err) {
        showResult(`Ошибка: ${err.message}`, true);
      }
    }

    async function testInsert() {
      try {
        showResult('Пробуем вставить тестовые данные...');

        // Тестовые данные с минимальным набором полей
        const testData = {
          FIO: "Тестовый Гость",
          attending: "Да",
          guests_count: 1
        };

        const { data, error } = await supabase
          .from('guests')
          .insert([testData])
          .select();

        if (error) {
          showResult(`❌ Ошибка INSERT:\n${JSON.stringify(error, null, 2)}`, true);
          
          // Анализируем ошибку
          if (error.message.includes('column')) {
            showResult(`Проблема с колонкой. Проверьте названия полей в БД.\n\nОшибка: ${error.message}`, true);
          } else if (error.code === '42501') {
            showResult(`Ошибка доступа (RLS). Нужно создать политику INSERT в Supabase.`, true);
          }
        } else {
          showResult(`✅ Успешный INSERT!\nДанные сохранены:\n${JSON.stringify(data, null, 2)}`);
        }
      } catch (err) {
        showResult(`Ошибка: ${err.message}`, true);
      }
    }
  </script>

  <hr>

  <h2>Рабочая форма</h2>
  <form id="simple-form">
    <input type="text" id="fio" placeholder="ФИО" required><br><br>
    <input type="text" id="sputnik" placeholder="ФИО спутника"><br><br>
    <select id="attending" required>
      <option value="">Придете?</option>
      <option value="Да">Да</option>
      <option value="Нет">Нет</option>
    </select><br><br>
    <input type="number" id="guests" value="1" min="1"><br><br>
    <input type="text" id="alcohol" placeholder="Алкоголь"><br><br>
    <input type="text" id="allergy" placeholder="Аллергии"><br><br>
    <input type="text" id="track" placeholder="Любимый трек"><br><br>
    <button type="submit">Отправить</button>
  </form>

  <div id="form-result"></div>

  <script>
    // Простая форма с правильными названиями
    document.getElementById('simple-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formResult = document.getElementById('form-result');
      formResult.innerHTML = 'Отправка...';
      
      // Определите ТОЧНЫЕ названия колонок из вашей БД
      const formData = {
        FIO: document.getElementById('fio').value,
        FIOsputnik: document.getElementById('sputnik').value || null,
        attending: document.getElementById('attending').value,
        guests_count: parseInt(document.getElementById('guests').value),
        alcohol: document.getElementById('alcohol').value || null,
        // ВАЖНО: замените "allergic" на точное название из вашей БД
        allergic: document.getElementById('allergy').value || null,  // ← ИЗМЕНИТЕ ЭТО
        favtrack: document.getElementById('track').value || null
      };
      
      console.log('Отправка данных:', formData);
      
      try {
        const { data, error } = await supabase
          .from('guests')
          .insert([formData]);
        
        if (error) {
          formResult.innerHTML = `Ошибка: ${error.message}`;
          console.error('Детали:', error);
        } else {
          formResult.innerHTML = 'Успешно отправлено!';
        }
      } catch (err) {
        formResult.innerHTML = `Ошибка: ${err.message}`;
      }
    });
  </script>
</body>
</html>
